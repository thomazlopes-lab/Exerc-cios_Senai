<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
</head>
<body>
    <table border="1">
    <caption>Bandas e Discos</caption>
        <thead>
            <tr>
                <th>Artista</th>
                <th>Gênero</th>
                <th>Disco</th>
                <th>Single</th>
            </tr>
        </thead>
        <tfoot>
            <tr>
                <td colspan="4">Fonte:.......</td>
            </tr>
        </tfoot>
        <tbody>
            <tr>
                <td>Led Zeppelin</td>
                <td>Hard Rock / Progressivo</td>
                <td>Led Zeppelin III</td>
                <td>Immigrant Song</td>
            </tr>
            <tr>
                <td>AC/DC</td>
                <td>Hard Rock</td>
                <td>Back in Black</td>
                <td>Hells Bells</td>
            </tr>
            <tr>
                <td>Foo Fighters</td>
                <td>Post-grunge</td>
                <td>In Your Honor</td>
                <td>Best of You</td>
            </tr>
            <tr>
                <td>Red Hot Chili Peppers</td>
                <td>Rock alternativo</td>
                <td>Californication</td>
                <td>Californication</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
